# Generated by `harkonnen setup init`
# Review provider API key env vars, routing, and MCP settings before sharing broadly.

[setup]
name = "caleb-siemens-laptop"
template = "home-linux"
platform = "linux"
anythingllm = true
openclaw = true

[machine]
name = "caleb-siemens-laptop"
username = "earthling"
generated_at = "2026-03-30T17:03:20.462674579+00:00"

[machine.fingerprint]
platform = "linux"
arch = "x86_64"
git = true
cargo = true
node = false
npm = false
docker = false
podman = false
openclaw = true

[providers]
default = "gemini"

[providers.claude]
type = "anthropic"
model = "claude-sonnet-4-6"
api_key_env = "ANTHROPIC_API_KEY"
enabled = true
usage_rights = "standard"
surface = "claude-code"

[providers.gemini]
type = "google"
model = "gemini-2.0-flash"
api_key_env = "GEMINI_API_KEY"
enabled = true
usage_rights = "standard"
surface = "antigravity"

[providers.codex]
type = "openai"
model = "gpt-4o"
api_key_env = "OPENAI_API_KEY"
enabled = true
usage_rights = "targeted"
surface = "vscode"

[routing.agents]
mason = "codex"
coobie = "claude"

[[mcp.servers]]
name = "filesystem"
command = "npx"
args = [
    "-y",
    "@modelcontextprotocol/server-filesystem",
    "./products",
    "./factory/workspaces",
    "./factory/artifacts",
]
tool_aliases = [
    "filesystem_read",
    "workspace_write",
    "artifact_writer",
]

[[mcp.servers]]
name = "memory"
command = "npx"
args = [
    "-y",
    "@modelcontextprotocol/server-memory",
]
tool_aliases = [
    "memory_store",
    "metadata_query",
]

[[mcp.servers]]
name = "sqlite"
command = "npx"
args = [
    "-y",
    "@modelcontextprotocol/server-sqlite",
    "./factory/state.db",
]
tool_aliases = ["db_read"]

[[mcp.servers]]
name = "github"
command = "npx"
args = [
    "-y",
    "@modelcontextprotocol/server-github",
]
tool_aliases = [
    "fetch_docs",
    "github_read",
]

[mcp.servers.env]
GITHUB_PERSONAL_ACCESS_TOKEN = "GITHUB_TOKEN"

[[mcp.servers]]
name = "brave-search"
command = "npx"
args = [
    "-y",
    "@modelcontextprotocol/server-brave-search",
]
tool_aliases = ["web_search"]

[mcp.servers.env]
BRAVE_API_KEY = "BRAVE_API_KEY"
