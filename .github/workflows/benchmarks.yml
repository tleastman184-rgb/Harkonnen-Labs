name: Benchmarks

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  local-regression:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run local benchmark gate
        run: ./scripts/run-benchmarks.sh --suite local_regression --strict --output factory/artifacts/benchmarks/github-actions-local-regression.json

      - name: Publish benchmark summary
        run: |
          echo '## Local Regression Benchmark' >> "$GITHUB_STEP_SUMMARY"
          cat factory/artifacts/benchmarks/github-actions-local-regression.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: factory/artifacts/benchmarks/
