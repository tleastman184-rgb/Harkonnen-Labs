      - "Pair Verified reporting with SWE-bench Pro or an equivalent harder benchmark when publishing frontier claims."
    tags:
      - "external"
      - "mason"
      - "piper"
      - "bramble"
      - "coding"
      - "verified"
    steps:
      - id: "swebench_verified_adapter"
        label: "SWE-bench Verified adapter"
        program: "./scripts/benchmark-swebench.sh"

  - id: "mason_swebench_pro"
    title: "Mason/Piper/Bramble on SWE-bench Pro"
    subsystem: "code_loop"
    category: "software_engineering"
    tier: "target"
    description: >-
      Harder software-engineering benchmark for stronger public claims about the coding loop.
    benchmark_url: "https://labs.scale.com/papers/swe_bench_pro"
    leaderboard_url: "https://www.swebench.com/"
    baseline_reference: >-
      Report % Resolved alongside the exact task set, evaluation recipe, and model routing
      so readers can compare Harkonnen against frontier-oriented baselines.
    required_env:
      - "SWEBENCH_PRO_COMMAND"
    setup_notes:
      - "Set SWEBENCH_PRO_COMMAND to the exact local or cloud command that runs the Harkonnen Pro adapter."
      - "If using a local checkout, point SWEBENCH_PRO_ROOT at the SWE-bench repository or adapter workspace."
      - "Keep Verified and Pro scores side by side so continuity and frontier difficulty are both visible."
    tags:
      - "external"
      - "mason"
      - "piper"
      - "bramble"
      - "coding"
      - "pro"
    steps:
      - id: "swebench_pro_adapter"
        label: "SWE-bench Pro adapter"
        program: "./scripts/benchmark-swebench-pro.sh"
