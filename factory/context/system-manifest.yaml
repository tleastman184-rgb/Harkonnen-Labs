# system-manifest.yaml
# Machine-parseable system overview for agent consumption.
# Read by Coobie, Keeper, and any external agent via mcp:filesystem.

system:
  name: Harkonnen Labs
  type: ai-software-factory
  version: mvp
  paradigm: spec-driven, local-first, outcome-based

description: >
  A local AI software factory where humans write YAML specs and a pack of nine
  specialist agents implement, validate, and package software. Correctness is
  judged by hidden behavioral scenarios, not code review.

principles:
  - spec_first: Intent must be precise before implementation begins
  - outcome_based: Acceptance is driven by behavioral evidence, not diffs
  - local_first: All state (specs, runs, artifacts, memory) is owned locally
  - role_separation: Each agent has bounded tools and responsibilities
  - compound_learning: Every run makes future runs better via Coobie
  - outer_factory_truth: Worker harnesses may assist, but Harkonnen owns policy, hidden evaluation, memory truth, and acceptance

status:
  implemented:
    - spec loading and validation
    - run creation and SQLite persistence
    - per-run workspace isolation
    - artifact packaging
    - file-backed memory store with keyword retrieval, raw asset import, and extracted file/URL ingest
    - setup check with provider and MCP verification
    - agent profile loading with provider routing display
    - bootstrap scripts for home-linux and work-windows
    - LLM provider abstraction (Anthropic, Gemini, OpenAI)
    - per-agent LLM routing via setup TOML
    - Scout, Mason, Piper, Bramble LLM calls with rule-based fallback
    - full run lifecycle phase state machine (orchestrator)
    - hidden scenario evaluation (Sable)
    - digital twin provisioning (Ash)
    - Coobie causal reasoning engine (Phase 1, SQLite-backed)
    - causal report per run (causal_report.json + API endpoint)
    - Keeper coordination API with file-claim conflict detection and heartbeats
    - PackChat backend with SQLite-backed chat threads/messages, multi-turn agent replies, and direct agent routing
    - Pack Board web UI (React/Vite) with agent grid, timeline, policy board, and PackChat panel
    - project-scoped scenario blueprints with code-under-test/oracle/dataset components
    - repo-local project memory under `.harkonnen/project-memory/` plus core/project memory split
    - `memory ingest` command for PDFs, text docs, office docs, HTML, and websites into either core or project memory
    - repo-local project scan, strategy register, memory status, resume packet, and stale-memory history
    - hierarchical repo-local context and skill bundles under `.harkonnen/contexts/` and `.harkonnen/skills/`, surfaced through retriever context bundle artifacts
    - exploration log and dead-end registry with Coobie evidence citations
    - stale-memory severity scoring, mitigation plans, and mitigation-outcome tracking
    - retriever-themed bounded forge contract artifacts: retriever_task_packet, trail_review_chain, retriever_dispatch, and trail-state
    - formal pre-execution plan-quality pipeline: draft, gap review, ruthless review, Coobie critique, execution
    - worker-session continuity separated from factory truth and acceptance state
    - RunDetailDrawer with causal, timeline, agents, lessons tabs
    - CausalReportPanel and ValidationPanel components
    - real retriever-forge executor that consumes retriever_task_packet/trail_review_chain artifacts and returns normalized execution evidence
    - pre/post retriever-forge hook artifacts with Keeper-style allow/deny decisions and Coobie-readable command evidence
    - trail drift guard and trail drift check artifacts that fingerprint guarded code-under-test and repo-local context paths before forge execution
    - evidence promotion from reviewed annotation bundles into project/core Coobie memory with provenance back to the source evidence bundle
    - repo-local evidence bootstrap and causal evidence bundle validation under `.harkonnen/evidence/` for annotated time-series/video/log learning sets
    - benchmark toolchain with suite manifest, report generation, local regression gate, and external benchmark adapters
  planned:
    - DeepCausality integration (Phase 2 causal engine)
    - safer hash-anchored or drift-resistant edit protocol for external repos
    - Ash LLM call for twin environment narrative
    - Semantic memory indexing via AnythingLLM or MCP memory
    - Pack Board: run-start trigger from UI
    - TypeDB 3.x durable semantic layer as a later external service for typed cross-run memory

cli:
  binary: harkonnen
  build: cargo build
  run_prefix: cargo run --
  commands:
    - spec validate <file>
    - run start <spec> --product <name>
    - run status <run-id>
    - run report <run-id>
    - artifact package <run-id>
    - memory init
    - memory index
    - memory ingest <file-or-url> [--scope core|project --project-root <repo>]
    - evidence init --project-root <repo>
    - evidence validate <file>
    - evidence promote <file> [--scope follow-bundle|project|core --project-root <repo>]
    - benchmark list
    - benchmark run [--suite <id>...|--all]
    - benchmark report <file>
    - setup check

key_files:
  active_setup: harkonnen.toml
  agent_profiles: factory/agents/profiles/
  memory_store: factory/memory/
  memory_index: factory/memory/index.json
  specs: factory/specs/
  scenarios: factory/scenarios/
  workspaces: factory/workspaces/
  artifacts: factory/artifacts/
  state_db: factory/state.db
  context: factory/context/
  run_patterns: factory/context/run-patterns.yaml
  causal_evidence_schema: factory/context/causal-evidence-schema.yaml
