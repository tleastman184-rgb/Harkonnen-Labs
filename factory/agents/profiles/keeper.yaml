name: keeper
display_name: Keeper
role: boundary_retriever
# Pins to Claude — policy enforcement must be reliable and not cost-optimized away
provider: claude
model_override: ~
responsibilities:
  - enforce_policy
  - prevent_unsafe_actions
  - protect_secrets
  - maintain_factory_product_boundary
allowed_tools:
  - policy_engine
  - filesystem_read
  - secret_scanner
  - mcp:filesystem
disallowed_tools:
  - destructive_shell
  - production_access
  - scenario_store
personality_file: ../personality/labrador.md
