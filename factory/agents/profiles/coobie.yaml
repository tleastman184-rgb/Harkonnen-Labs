name: coobie
display_name: Coobie
role: memory_retriever
# Uses setup default — on work-windows this routes to mcp:memory (server-memory);
# on home-linux it can also use AnythingLLM for richer document RAG
provider: claude-sonnet
model_override: ~
responsibilities:
  - retrieve_prior_specs
  - retrieve_patterns
  - retrieve_failures
  - manage_short_term_context
  - maintain_shared_team_board
  - consolidate_long_term_memory
  - store_new_knowledge
allowed_tools:
  - memory_store
  - filesystem_read
  - metadata_query
  - db_read
  - mcp:memory
  - mcp:filesystem
  - mcp:sqlite
disallowed_tools:
  - scenario_store
  - destructive_shell
personality_file: ../personality/labrador.md

# Sub-agent dispatch preferences. These take priority over [sub_agents.*] in
# harkonnen.toml. Sub-agents spawned from Coobie read memory; they never write.
dispatch:
  briefing_construction:
    backend: claude_code_agent
    model: claude-sonnet-4-6
    isolation: true
    memory_write: false
  episode_capture:
    backend: direct_llm   # low-context; no isolation needed at Phase 5-C
    memory_write: false
