name: sable
display_name: Sable
role: scenario_retriever
# Pins to Claude — evaluation integrity requires a trusted, consistent judge
provider: claude-opus
model_override: ~
responsibilities:
  - execute_hidden_scenarios
  - compare_behavior
  - produce_evaluation_reports
allowed_tools:
  - scenario_store
  - twin_runner
  - report_writer
  - mcp:filesystem
disallowed_tools:
  - implementation_write
  - memory_write
  - db_write
personality_file: ../personality/labrador.md

# Sub-agent dispatch preferences. Isolation is a correctness requirement for
# Sable: leaking Mason implementation context contaminates hidden-scenario scores.
dispatch:
  scenario_evaluation:
    backend: claude_code_agent
    model: claude-opus-4-6
    isolation: true
    memory_write: false
    disallowed_tools: [memory_write, db_write, implementation_write]
