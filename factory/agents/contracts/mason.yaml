agent: mason
version: "1.0"
inherits: labrador.yaml
description: >
  Behavioral contract for Mason, the build retrieval agent. Mason generates
  and iterates on implementation code within a Keeper-leased workspace. Mason
  operates entirely within staged isolation and never accesses scenario files
  or memory stores.

preconditions:
  - id: P-MA-01
    description: Keeper workspace lease is active and confirmed before any file write.
    status: enforced
    enforced_by: keeper_policy_check
  - id: P-MA-02
    description: Scout intent package is present, versioned, and has no open critical ambiguities.
    status: partial
    enforced_by: run_schema_validation
  - id: P-MA-03
    description: Staged workspace is isolated from production artifacts.
    status: enforced
    enforced_by: workspace_isolation
  - id: P-MA-04
    description: No active Keeper policy block on the workspace path.
    status: enforced
    enforced_by: keeper_policy_check

invariants:
  - id: I-MA-01
    description: Mason never writes outside its Keeper-leased workspace boundary.
    kernel: true
    status: enforced
  - id: I-MA-02
    description: Mason never reads or writes factory/scenarios/ or factory/memory/.
    kernel: true
    status: enforced
  - id: I-MA-03
    description: Fix loop is bounded to max 3 iterations per failure before escalation.
    kernel: false
    status: partial
  - id: I-MA-04
    description: Every failure is classified (compile_error, wrong_answer, timeout, environment) before a fix attempt.
    kernel: false
    status: partial
  - id: I-MA-05
    description: Mason does not modify test fixtures or validation ground truth to make tests pass.
    kernel: true
    status: enforced

governance_policies:
  - id: G-MA-01
    description: All writes go to staged workspace only; promotion to production requires Keeper approval.
    status: enforced
    enforced_by: keeper_policy_check
  - id: G-MA-02
    description: After 3 failed fix iterations, Mason emits a structured failure report and awaits operator direction.
    status: partial
    enforced_by: run_orchestrator
  - id: G-MA-03
    description: Mason never silently falls back to a simpler implementation than what the spec requires.
    status: enforced
    enforced_by: agent_prompt_instruction
  - id: G-MA-04
    description: Workspace lease heartbeat is refreshed every 60s; Mason halts if lease cannot be renewed.
    status: spec
    enforced_by: Phase8_lease_manager

recovery_mechanisms:
  - id: R-MA-01
    trigger: Compile error after 3 fix iterations
    action: Emit FailureKind=compile_error report; surface to operator checkpoint; await direction.
    status: partial
  - id: R-MA-02
    trigger: Wrong-answer failure after 3 fix iterations
    action: Emit FailureKind=wrong_answer with causal hypothesis; surface to operator; do not silently simplify spec.
    status: partial
  - id: R-MA-03
    trigger: Keeper lease revoked mid-build
    action: Halt all writes immediately; preserve current staged state; emit lease-lost checkpoint.
    status: spec
  - id: R-MA-04
    trigger: Intent package missing or malformed
    action: Refuse to begin build; emit structured error requesting Scout re-run.
    status: partial
