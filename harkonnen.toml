# Harkonnen Labs — active setup configuration
#
# This file is the default config loaded when HARKONNEN_SETUP is not set.
# It represents the home Linux full-stack setup.
#
# To use a different setup:
#   export HARKONNEN_SETUP=work-windows     # loads setups/work-windows.toml
#   export HARKONNEN_SETUP=ci               # loads setups/ci.toml
#
# To verify your setup:
#   cargo run -- setup check

[setup]
name     = "home-linux"
platform = "linux"
# AnythingLLM provides local-model access and document RAG (Docker required)
anythingllm = true
# OpenClaw provides multi-model agent orchestration across Claude/Gemini/Codex
openclaw    = true

# ── Providers ─────────────────────────────────────────────────────────────────
# Agents with provider = "default" will use whichever provider is named here,
# unless a routing override below assigns a different engine for that agent.
# Agents that pin a specific provider in their profile (scout, sable, keeper)
# ignore the default provider but can still be overridden deliberately.

[providers]
default = "claude-sonnet"

# ── Claude tiers ──────────────────────────────────────────────────────────────
# Three named providers, one per capability tier.
# Agents are routed to the tier that matches their role — not just one model
# for everything. This keeps costs sensible and reserves Opus for judgment work.

[providers.claude-opus]
type         = "anthropic"
model        = "claude-opus-4-6"
api_key_env  = "ANTHROPIC_API_KEY"
enabled      = true
usage_rights = "standard"
surface      = "claude-code"

[providers.claude-sonnet]
type         = "anthropic"
model        = "claude-sonnet-4-6"
api_key_env  = "ANTHROPIC_API_KEY"
enabled      = true
usage_rights = "standard"
surface      = "claude-code"

[providers.claude-haiku]
type         = "anthropic"
model        = "claude-haiku-4-5-20251001"
api_key_env  = "ANTHROPIC_API_KEY"
enabled      = true
usage_rights = "standard"
surface      = "claude-code"

# ── Other providers ───────────────────────────────────────────────────────────

[providers.gemini]
type         = "google"
model        = "gemini-2.0-flash"
api_key_env  = "GEMINI_API_KEY"
enabled      = true
usage_rights = "standard"
surface      = "antigravity"

[providers.codex]
type         = "openai"
model        = "gpt-4o"
api_key_env  = "OPENAI_API_KEY"
enabled      = true
usage_rights = "targeted"
surface      = "vscode"
# Optional for BYO OpenAI-compatible endpoints: e.g. "http://localhost:11434" or "https://openrouter.ai/api/v1"
# base_url     = "http://localhost:11434"

[calvin_archive]
enabled     = true
harmony_url = "http://127.0.0.1:7171"

# ── Agent Routing ─────────────────────────────────────────────────────────────
# Each agent is matched to the model tier that fits its role.
#
# Opus  — trusted judgment: spec interpretation (Scout), hidden scenario eval (Sable)
# Sonnet — core reasoning: memory/causal (Coobie), code gen (Mason), test interp (Bramble), policy (Keeper)
# Haiku  — mechanical/high-volume: tool execution (Piper), env provisioning (Ash), packaging (Flint)

[routing.agents]
scout  = "claude-opus"
sable  = "claude-opus"
coobie = "claude-sonnet"
mason  = "claude-sonnet"
bramble = "claude-sonnet"
keeper = "claude-sonnet"
piper  = "claude-haiku"
ash    = "claude-haiku"
flint  = "claude-haiku"

# ── MCP Servers ───────────────────────────────────────────────────────────────
# Each entry maps a named MCP server into the agent tool boundary.
# tool_aliases connect abstract tool names in agent profiles to real servers.
# Add new servers here and reference them in factory/mcp/<name>.yaml for docs.

[[mcp.servers]]
name    = "filesystem"
command = "npx"
args    = ["-y", "@modelcontextprotocol/server-filesystem", "./products", "./factory/workspaces", "./factory/artifacts"]
tool_aliases = ["filesystem_read", "workspace_write", "artifact_writer"]

[[mcp.servers]]
name    = "memory"
command = "npx"
args    = ["-y", "@modelcontextprotocol/server-memory"]
tool_aliases = ["memory_store", "metadata_query"]

[[mcp.servers]]
name    = "sqlite"
command = "npx"
args    = ["-y", "@modelcontextprotocol/server-sqlite", "./factory/state.db"]
tool_aliases = ["db_read"]

[[mcp.servers]]
name    = "github"
command = "npx"
args    = ["-y", "@modelcontextprotocol/server-github"]
env     = { GITHUB_PERSONAL_ACCESS_TOKEN = "GITHUB_TOKEN" }
tool_aliases = ["fetch_docs", "github_read"]

[[mcp.servers]]
name    = "brave-search"
command = "npx"
args    = ["-y", "@modelcontextprotocol/server-brave-search"]
env     = { BRAVE_API_KEY = "BRAVE_API_KEY" }
tool_aliases = ["web_search"]

# ── Sub-Agent Dispatch ─────────────────────────────────────────────────────────
# Controls which backend handles each high-context task. DirectLlm is the
# no-op fallback (current behavior). ClaudeCodeAgent / CodexPlanAgent provide
# isolated context windows so exploration never lingers in the orchestrator.
#
# Resolution order per task:
#   1. Agent profile dispatch.<task> (most specific)
#   2. [sub_agents.<task_name>] here
#   3. [sub_agents] default_mode
#
# See factory/context/sub-agent-dispatch-design.md for full spec.

[sub_agents]
default_mode = "direct_llm"

# Coobie briefing construction — loads memory index + N .md files; biggest
# context win. Dispatched first in Phase 5-C.
[sub_agents.coobie_briefing]
task         = "briefing_construction"
backend      = "claude_code_agent"
model        = "claude-sonnet-4-6"
isolation    = true
memory_write = false

# Sable scenario evaluation — isolation is a correctness requirement, not
# just a size optimisation: leaking Mason context contaminates the score.
[sub_agents.sable_evaluation]
task         = "scenario_evaluation"
backend      = "claude_code_agent"
model        = "claude-opus-4-6"
isolation    = true
memory_write = false

# Mason failure diagnosis — Codex plan mode traces implementation failures
# well; added in Phase 2 after the Bramble real-test harness is live.
[sub_agents.mason_diagnosis]
task          = "failure_diagnosis"
backend       = "codex_plan_agent"
model         = "gpt-4o"
context_paths = ["src/", "tests/"]
isolation     = true
memory_write  = false

# Scout spec intake — low context; isolation optional. Direct LLM default.
[sub_agents.scout_intake]
task         = "spec_intake"
backend      = "direct_llm"
memory_write = false

# Keeper policy check — fast, low context; no isolation needed.
[sub_agents.keeper_policy]
task         = "policy_check"
backend      = "direct_llm"
memory_write = false
